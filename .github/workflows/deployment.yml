name: Deploy Nodejs code on ExCloud 

# Trigger Event
on:
  push:
    branches:
      - main

# Steps
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        run: |
          docker build -t ankithex/chaicode-node .
          docker push ankithex/chaicode-node

      - name: Deploy on Excloud Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            # export NVM_DIR="$HOME/.nvm"
            # [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            # cd /home/ubuntu/Devops-Node-Server-
            # git pull
            # npm install 
            # pm2 restart 0

            #kill the existing docker container 
            sudo docker rm -f chaicode-node || true

            #again pull the fresh image from hub
            sudo docker pull ankithex/chaicode-node

            #Run docker run -d -p 8000:8000 ankithex/chaicode-node
            sudo docker run -d --name chaicode-node --restart unless-stopped -p 80:8000 ankithex/chaicode-node

            #Clean Up old/unused images
            sudo docker image prune -f   



        